
<div class="forgot-password-container">
	<form class="forgot-password-form" autocomplete="off">
		<div class="form-header">
			<div class="icon-circle">
				<svg width="32" height="32" fill="none" stroke="#4a4e69" stroke-width="2" viewBox="0 0 24 24">
					<rect x="3" y="7" width="18" height="13" rx="2" stroke="#4a4e69"/>
					<path d="M16 3v4M8 3v4" stroke="#4a4e69"/>
				</svg>
			</div>
			<h2>Forgot Password</h2>
			<p class="subtitle">Enter your email address and we'll send you a link to reset your password.</p>
		</div>

		<div class="input-group">
			<label for="email">Email Address</label>
			<div class="input-icon">
				<svg width="18" height="18" fill="none" stroke="#c9c9c9" stroke-width="2" viewBox="0 0 24 24">
					<path d="M4 4h16v16H4z" stroke="#c9c9c9"/>
					<path d="M22 6l-10 7L2 6" stroke="#c9c9c9"/>
				</svg>
				<input type="email" id="email" placeholder="Email address" required class="input-email" />
			</div>
		</div>

		<div class="input-group">
			<label for="newPassword">New Password</label>
			<div class="input-icon">
				<svg width="18" height="18" fill="none" stroke="#c9c9c9" stroke-width="2" viewBox="0 0 24 24">
					<circle cx="12" cy="12" r="10" stroke="#c9c9c9"/>
					<path d="M12 16v-4" stroke="#c9c9c9"/>
					<circle cx="12" cy="8" r="1" fill="#c9c9c9"/>
				</svg>
				<input type="password" id="newPassword" placeholder="New Password" required class="input-password" />
			</div>
		</div>

		<div class="input-group">
			<label for="confirmPassword">Confirm New Password</label>
			<div class="input-icon">
				<svg width="18" height="18" fill="none" stroke="#c9c9c9" stroke-width="2" viewBox="0 0 24 24">
					<circle cx="12" cy="12" r="10" stroke="#c9c9c9"/>
					<path d="M12 16v-4" stroke="#c9c9c9"/>
					<circle cx="12" cy="8" r="1" fill="#c9c9c9"/>
				</svg>
				<input type="password" id="confirmPassword" placeholder="Confirm New Password" required class="input-password" />
			</div>
		</div>

		<button type="submit" class="submit-btn" (click)="resetPassword()">Send Reset Link</button>
		<a routerLink="/login" class="back-link">Back to Login</a>
	</form>
	
</div>
